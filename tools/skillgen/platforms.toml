[platform.amp]
bucket = "split"
core = "core"
skill_dst = "map_mmd/skill-amp.md"
refs_dst = "map_mmd/skills/amp/references"
description = "Use for any question about a codebase, its architecture, file relationships, or project content — especially when map.mmd-out/ exists, where the question should be treated as a map_mmd query first. Turns any input (code, docs, papers, images, videos) into a persistent knowledge graph with god nodes, community detection, and query/path/explain tools."
# Amp uses the Task tool with disk-collected results (the plain task-tool-disk
# dispatch — NOT the trae variant; amp's v8 never carried the no-PreToolUse
# caveat). It reads AGENTS.md and wires always-on via `map_mmd amp install`, so
# it uses the agents-md hooks variant with amp's own (caveat-free) wording.
dispatch = "task-tool-disk"
extraction = "verbose"
hooks_variant = "agents-md"

[platform.agents]
bucket = "split"
core = "core"
skill_dst = "map_mmd/skill-agents.md"
refs_dst = "map_mmd/skills/agents/references"
description = "Use for any question about a codebase, its architecture, file relationships, or project content — especially when map.mmd-out/ exists, where the question should be treated as a map_mmd query first. Turns any input (code, docs, papers, images, videos) into a persistent knowledge graph with god nodes, community detection, and query/path/explain tools."
# The generic cross-framework Agent-Skills target (~/.agents/skills and
# ./.agents/skills). Like amp, it reads AGENTS.md and wires always-on via
# `map_mmd agents install`, so it uses the plain task-tool-disk dispatch and the
# agents-md hooks variant. The rendered skill body is identical to amp's; only the
# hooks reference differs (its own caveat-free `map_mmd agents install` wording).
# It is a brand-new post-v8 platform, so its --audit-coverage baseline is amp's v8
# body (the body it re-homes); see _v8_baseline_ref in gen.py.
dispatch = "task-tool-disk"
extraction = "verbose"
hooks_variant = "agents-md"

[platform.trae]
bucket = "split"
core = "core"
skill_dst = "map_mmd/skill-trae.md"
refs_dst = "map_mmd/skills/trae/references"
description = "Use for any question about a codebase, its architecture, file relationships, or project content — especially when map.mmd-out/ exists, where the question should be treated as a map_mmd query first. Turns any input (code, docs, papers, images, videos) into a persistent knowledge graph with god nodes, community detection, and query/path/explain tools."
# Trae reads AGENTS.md, not CLAUDE.md, and has no PreToolUse hook. The dispatch
# block carries the no-PreToolUse caveat and the hooks reference wires
# `map_mmd trae install` -> AGENTS.md. trae-cn reuses this same bundle.
dispatch = "task-tool-disk-trae"
extraction = "verbose"
hooks_variant = "agents-md"

